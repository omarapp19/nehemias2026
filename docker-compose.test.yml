services:
  db-test:
    image: postgres:16
    restart: "no"
    environment:
      POSTGRES_USER: nehemias_test
      POSTGRES_PASSWORD: nehemias_test
      POSTGRES_DB: nehemias_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nehemias_test -d nehemias_test"]
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
